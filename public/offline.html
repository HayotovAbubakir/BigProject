<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Vasta</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #f5f5f5;
        font-family:
          "Inter",
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 24px 28px;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
        letter-spacing: 0.01em;
      }
      p {
        margin: 0 0 12px;
        color: #cfcfcf;
        line-height: 1.55;
      }
      small {
        color: #9c9c9c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Vasta needs a connection for the latest data. We'll automatically
        retry as soon as you're back online.
      </p>
      <small
        >Tip: content you opened recently stays cached for quick access.</small
      >
    </div>
    <script>
      (async () => {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations()
            await Promise.all(regs.map((r) => r.unregister()))
          }
          if (window.caches) {
            const keys = await caches.keys()
            await Promise.all(keys.map((k) => caches.delete(k)))
          }
          // Prevent reload loops: only reload once per session
          if (!sessionStorage.getItem('sw-unregistered')) {
            sessionStorage.setItem('sw-unregistered', '1')
            location.reload()
          }
        } catch (e) {
          // No-op: leave the offline page if something goes wrong
          console.error('SW cleanup failed', e)
        }
      })()
    </script>
  </body>
</html>
